version: '3.8'

services:
  web:
    # Builds the same image used for container deployment while keeping local
    # source mounted for faster development iteration.
    build: .
    container_name: toxic-detector
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      # Keep bytecode generated inside the container from polluting the host.
      - /app/__pycache__
    restart: unless-stopped
