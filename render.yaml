services:
  - type: web
    name: toxic-review-detector
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 1 --worker-class sync --timeout 180 --graceful-timeout 30 --keep-alive 30 --max-requests 1000 --max-requests-jitter 100
    healthCheckPath: /api/health
    healthCheckInterval: 30
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_ENV
        value: production
      - key: TRANSFORMERS_NO_TF
        value: "1"
      - key: USE_TF
        value: "0"
      - key: USE_TORCH
        value: "1"
      - key: TOKENIZERS_PARALLELISM
        value: "false"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: TRANSFORMERS_VERBOSITY
        value: "error"
      - key: CUDA_VISIBLE_DEVICES
        value: ""

