services:
  - type: web
    name: toxic-review-detector
    env: python
    plan: free
    # Render installs dependencies, then starts the Flask app behind Gunicorn.
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:5000 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000
